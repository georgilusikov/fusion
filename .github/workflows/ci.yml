name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q fusion_core scripts tests
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate benchmark fixture
        run: python scripts/benchmark.py --dry-run --limit 1 >/dev/null
